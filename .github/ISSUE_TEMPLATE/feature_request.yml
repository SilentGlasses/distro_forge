name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What need would this feature address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature and how it would work from the user's perspective.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there existing workarounds? Other designs you considered?

  - type: checkboxes
    id: terms
    attributes:
      label: Confirm
      options:
        - label: I searched existing issues and discussions before filing this one.
          required: true
