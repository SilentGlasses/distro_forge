name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      
    steps:
      - uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      # Runs Snyk Code (SAST) analysis
      # Added '|| true' to ensure the sarif file is created even if vulnerabilities are found
      - name: Snyk Code test
        run: snyk code test --sarif > snyk-code.sarif || true

      # Runs Snyk Open Source (SCA)
      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects

      # Runs Snyk Infrastructure as Code (IaC)
      - name: Snyk IaC test and report
        run: snyk iac test --report || true

      # Build the docker image for testing
      # Note: Ensure "your/image-to-test" matches your project naming if needed
      - name: Build a Docker image
        run: docker build -t your/image-to-test .

      # Runs Snyk Container analysis
      - name: Snyk Container monitor
        run: snyk container monitor your/image-to-test --file=Dockerfile

      # Push the Snyk Code results into GitHub Code Scanning tab
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
