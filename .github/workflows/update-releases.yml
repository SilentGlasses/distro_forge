name: Update supported releases

on:
  # Weekly on Monday 06:00 UTC.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-releases
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate assets/data/releases.js
        run: node scripts/update-releases.mjs

      - name: Open a PR if release data changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/update-releases
          base: main
          title: "chore(releases): refresh supported-release data"
          commit-message: "chore(releases): refresh supported-release data"
          body-path: .release-notes.md
          labels: release-data
          add-paths: assets/data/releases.js
          delete-branch: true
